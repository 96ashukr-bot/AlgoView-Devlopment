upstream algoview_backend {
    server unix:/run/algoview/gunicorn.sock;
}

server {
    listen 80;
    server_name 3.109.40.137 app.sparkstechnologies.co.in;

    root /var/www/algoview/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://algoview_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /ws/ {
        proxy_pass http://algoview_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /static/ {
        root /var/www/algoview/frontend;
        try_files $uri @django_static;
    }

    location @django_static {
        internal;
        rewrite ^/static/(.*)$ /$1 break;
        root /var/www/algoview/backend/staticfiles;
        try_files $uri =404;
    }

    location /media/ {
        alias /var/www/algoview/backend/media/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
